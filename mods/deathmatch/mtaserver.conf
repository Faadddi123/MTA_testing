<config>
    <servername>My MTA Server</servername>
    <serverport>22003</serverport>
    <serverpassword>Sjkf125q@</serverpassword>
    <maxplayers>32</maxplayers>
    <httpport>22006</httpport>
    <logfile>logs/server.log</logfile>
    <authfile>logs/auth.log</authfile>
    <idfile>server-id.keys</idfile>
    <dbfile>registry.db</dbfile>
    <aclinternalfile>mods/deathmatch/acl.xml</aclinternalfile>
    <minclientversion>1.6.0-9.24043.0</minclientversion>

    <!-- ── ADMIN & UI ──────────────────────────────────────── -->
    <resource src="admin"          startup="1" protected="0" />
    <resource src="scoreboard"     startup="1" protected="0" />
    <resource src="freeroam"       startup="1" protected="0" />

    <!-- ── CORE (must start first) ──────────────────────────── -->
    <resource src="database_manager" startup="1" protected="0" />

    <!-- ── INTERIORS (must start before housing) ────────────────── -->
    <resource src="interiors"      startup="1" protected="0" />
    <resource src="open_interiors" startup="1" protected="0" />

    <!-- ── SYSTEMS (depend on database_manager) ─────────────── -->
    <resource src="inventory"      startup="1" protected="0" />
    <resource src="bank"           startup="1" protected="0" />
    <resource src="housing"        startup="1" protected="0" />
    <resource src="vehicles"       startup="1" protected="0" />
    <resource src="garage_system"  startup="1" protected="0" />
    <resource src="house_manager"  startup="1" protected="0" />
</config>

