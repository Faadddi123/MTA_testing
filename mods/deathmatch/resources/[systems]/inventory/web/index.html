<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory UI</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <section id="inventory-shell" class="inventory-shell hidden">
            <div class="inventory-backdrop"></div>
            <div class="inventory-panel">
                <header class="inventory-header">
                    <div>
                        <p class="eyebrow">Roleplay Inventory</p>
                        <h1>Storage</h1>
                    </div>
                    <div class="header-actions">
                        <button class="icon-button" type="button" title="Settings">
                            <i class="fa-solid fa-gear"></i>
                        </button>
                        <button id="inventory-close" class="icon-button close-button" type="button" title="Close">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </header>

                <section class="weight-panel">
                    <div class="weight-labels">
                        <span>Carry Weight</span>
                        <strong id="weight-text">0 / 35 kg</strong>
                    </div>
                    <div class="weight-bar">
                        <div id="weight-fill" class="weight-fill"></div>
                    </div>
                </section>

                <section class="inventory-grid-wrapper">
                    <div id="inventory-grid" class="inventory-grid"></div>
                </section>

                <footer class="quick-slot-panel">
                    <div class="quick-slot-label">Quick Slots</div>
                    <div id="quick-slots" class="quick-slot-grid"></div>
                </footer>
            </div>
        </section>

        <aside id="house-popup" class="house-popup hidden">
            <div class="house-popup-inner">
                <p class="eyebrow">Property</p>
                <h2 id="house-name">House</h2>
                <div class="house-meta">
                    <div class="meta-row">
                        <span>Owner</span>
                        <strong id="house-owner">Available</strong>
                    </div>
                    <div class="meta-row">
                        <span>Price</span>
                        <strong id="house-price">$0</strong>
                    </div>
                    <div class="meta-row">
                        <span>Status</span>
                        <strong id="house-status">Unlocked</strong>
                    </div>

                </div>
                <div id="house-actions" class="house-actions"></div>
            </div>
        </aside>
    </div>
    <script src="main.js"></script>
</body>
</html>
